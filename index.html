<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🥺 I'm REALLY Sorry!</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6e8,#ffe8c7);
    overflow:hidden;
}

.container{
    text-align:center;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
    max-width:600px;
}

h1{
    color:#ff4f87;
    margin-bottom:20px;
}

p{
    font-size:20px;
    line-height:1.7;
    color:#444;
}

button{
    margin-top:30px;
    padding:14px 32px;
    border:none;
    border-radius:40px;
    font-size:18px;
    cursor:pointer;
    transition:.25s;
}

#yes{
    background:#4CAF50;
    color:white;
}

#yes:hover{
    transform:scale(1.08);
}

#no{
    background:#ff4d4d;
    color:white;
    position:absolute;
}

#reply{
    margin-top:25px;
    font-size:26px;
    color:#ff2f6d;
    font-weight:bold;
}

.heart{
    position:absolute;
    color:#ff5a9e;
    animation:float 8s linear infinite;
    opacity:.5;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-120vh);
    }
}
</style>

</head>

<body>

<div class="container">

<h1>🥺 I'm REALLY Sorry!</h1>

<p>
I sincerely apologize. 🙏<br><br>

Please don't deprive me of the divine sight...<br>
I might never recover if you stop wearing those glittery thongs. ✨😂<br><br>

Will you forgive this foolish soul? ❤️
</p>

<button id="yes">Yes ❤️</button>
<button id="no">No 😤</button>

<div id="reply"></div>

</div>

<script>
const noBtn = document.getElementById("no");

function moveButton(){
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 70);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);

document.getElementById("yes").onclick = () =>{
    document.getElementById("reply").innerHTML =
    "🥹❤️ Thank you! You have forgiven this foolish soul. I promise to treasure every glittery moment! ✨";
};

for(let i=0;i<30;i++){
    const heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(15+Math.random()*25)+"px";
    heart.style.animationDuration=(5+Math.random()*6)+"s";
    heart.style.animationDelay=Math.random()*5+"s";
    document.body.appendChild(heart);
}
</script>

</body>
</html>
